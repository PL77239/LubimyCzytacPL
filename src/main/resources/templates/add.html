<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nowa Pozycja — Formularz</title>
    <style>
        :root {
            --bg-color: #fcfbf9;
            --text-color: #1a1a1a;
            --accent-color: #4a5d4e;
            --border-color: #e5e5e0;
            --focus-color: #a3b19b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 4rem 2rem;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
        }

        h1 {
            font-size: 1.75rem;
            font-weight: 400;
            letter-spacing: -0.02em;
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        input[type="text"], textarea {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border-color);
            background-color: white;
            border-radius: 4px;
            font-size: 1rem;
            box-sizing: border-box;
            transition: border-color 0.2s ease;
        }

        input[type="text"]:focus, textarea:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(74, 93, 78, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        .actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 2.5rem;
        }

        .btn-submit {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 0.75rem 2rem;
            font-size: 0.95rem;
            font-weight: 500;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        .btn-submit:hover {
            background-color: #3b4a3e;
        }

        .btn-cancel {
            color: var(--text-color);
            text-decoration: none;
            font-size: 0.95rem;
        }

        .btn-cancel:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Dodaj nową pozycję</h1>

    <form th:action="@{/add}" th:object="${book}" method="post">
        <div class="form-group">
            <label for="title">Tytuł książki</label>
            <input type="text" id="title" th:field="*{title}" placeholder="np. Proces" required autocomplete="off">
        </div>

        <div class="form-group">
            <label for="author">Autor</label>
            <input type="text" id="author" th:field="*{author}" placeholder="np. Franz Kafka" required autocomplete="off">
        </div>

        <div class="form-group">
            <label for="description">Opis / Notatka</label>
            <textarea id="description" th:field="*{description}" placeholder="Krótki zarys fabuły lub recenzja..."></textarea>
        </div>

        <div class="actions">
            <a th:href="@{/}" class="btn-cancel">Anuluj</a>
            <button type="submit" class="btn-submit">Zapisz w bazie</button>
        </div>
    </form>
</div>

</body>
</html>
