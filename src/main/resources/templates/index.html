<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LubimyCzytać.PL — Wirtualna Szafka</title>
    <style>
        :root {
            --bg-color: #f4f1ea;
            --book-width: 45px;
            --book-height: 130px;

            --accent-green: #4a5d4e;
            --accent-blue: #4a576d;
            --accent-red: #6d4a4a;
            --text-color: #333;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Kontener dopasowany do proporcji kwadratowego zdjęcia */
        .bookshelf-container {
            width: 700px;
            height: 700px;
            position: relative;
            background-image: url('/img/szafka.jpg');
            background-size: 100% 100%;
            background-repeat: no-repeat;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            border-radius: 4px;
        }

        header {
            position: absolute;
            top: -60px; /* Przeniesione nad szafkę, żeby nie zasłaniać górnych półek */
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 10px;
        }

        h1 {
            font-size: 2rem;
            font-weight: 300;
            letter-spacing: -0.02em;
            margin: 0;
            color: var(--text-color);
        }

        .btn-add {
            background-color: white;
            color: var(--accent-green);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            border: 1px solid var(--accent-green);
            padding: 0.5rem 1.2rem;
            border-radius: 4px;
            transition: all 0.2s ease;
        }

        .btn-add:hover {
            background-color: var(--accent-green);
            color: white;
        }

        /* SIATKA DOPASOWANA DO OKIENEK NA ZDJĘCIU */
        .shelf-books-container {
            position: absolute;
            /* Marginesy odcinające zewnętrzną, grubą ramę na zdjęciu */
            top: 4%;
            bottom: 4%;
            left: 4%;
            right: 4%;

            display: grid;
            grid-template-columns: repeat(3, 1fr); /* 3 okienka w poziomie */
            grid-template-rows: repeat(4, 1fr);    /* 4 okienka w pionie */
        }

        /* Kontener pozycjonujący książkę wewnątrz konkretnego okienka */
        .book-cell {
            display: flex;
            justify-content: center; /* Wyśrodkowanie w poziomie */
            align-items: flex-end;   /* Oparcie książki na dolnej półce */
            padding-bottom: 15px;    /* Delikatne podniesienie od krawędzi półki */
        }

        .book-wrapper {
            position: relative;
            width: var(--book-width);
            height: var(--book-height);
            perspective: 600px;
        }

        .book-spine {
            width: 100%;
            height: 100%;
            border-radius: 2px;
            display: flex;
            justify-content: center;
            align-items: center;
            transform-style: preserve-3d;
            transition: transform 0.4s ease, box-shadow 0.4s ease, filter 0.3s ease;
            cursor: pointer;
            text-decoration: none;
            box-shadow: inset 4px 0 10px rgba(0,0,0,0.1), 2px 2px 5px rgba(0,0,0,0.2);
        }

        .book-color-1 { background-color: var(--accent-green); }
        .book-color-2 { background-color: var(--accent-blue); }
        .book-color-3 { background-color: var(--accent-red); }

        .book-title-spine {
            writing-mode: vertical-rl;
            text-orientation: mixed;
            color: white;
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-height: 85%;
            transform: rotate(180deg);
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }

        /* EFEKT WYSUNIĘCIA Z PÓŁKI */
        .book-wrapper:hover .book-spine {
            transform: rotateX(5deg) translateY(10px) scale(1.1);
            box-shadow: 0 15px 25px rgba(0,0,0,0.4);
            z-index: 5;
        }

        .shelf-books-container:hover .book-wrapper:not(:hover) .book-spine {
            filter: brightness(0.7);
        }

        /* DYMEK (TOOLTIP) */
        .book-tooltip {
            position: absolute;
            top: -110px;
            left: 50%;
            transform: translateX(-50%) translateY(-10px);
            width: 220px;
            background-color: white;
            color: var(--text-color);
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease, transform 0.3s ease;
            z-index: 100;
            pointer-events: none;
            font-size: 0.9rem;
            text-align: left;
        }

        .book-tooltip::after {
            content: "";
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            border-width: 10px;
            border-style: solid;
            border-color: white transparent transparent transparent;
        }

        .book-tooltip-title { font-weight: 600; margin-bottom: 5px; color: var(--text-color); font-size: 1.05rem;}
        .book-tooltip-author { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--accent-green); margin-bottom: 8px; }
        .book-tooltip-desc { color: #666; font-size: 0.85rem; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }

        .book-wrapper:hover .book-tooltip {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(0);
        }

        .empty-state {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #888;
            font-style: italic;
            font-weight: 300;
            background: rgba(255,255,255,0.8);
            padding: 10px 20px;
            border-radius: 20px;
        }

    </style>
</head>
<body>

<div style="position: relative; margin-top: 60px;">
    <header>
        <h1>LubimyCzytać.PL</h1>
        <a th:href="@{/add}" class="btn-add">+ Nowa pozycja</a>
    </header>

    <div class="bookshelf-container">
        <main class="shelf-books-container">
            <div class="book-cell" th:each="book, stat : ${books}">
                <div class="book-wrapper">

                    <a th:href="@{/book/{id}(id=${book.id})}" class="book-spine"
                       th:classappend="'book-color-' + (${stat.count % 3} == 0 ? 3 : (${stat.count % 2} == 0 ? 2 : 1))">
                        <span class="book-title-spine" th:text="${book.title}">Tytuł</span>
                    </a>

                    <div class="book-tooltip">
                        <div class="book-tooltip-title" th:text="${book.title}">Tytuł</div>
                        <div class="book-tooltip-author" th:text="${book.author}">Autor</div>
                        <div class="book-tooltip-desc" th:text="${#strings.abbreviate(book.description, 100)}">fragment opisu...</div>
                    </div>

                </div>
            </div>
        </main>

        <div class="empty-state" th:if="${#lists.isEmpty(books)}">
            Regał jest pusty.
        </div>
    </div>
</div>

</body>
</html>
